apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-auto
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/claudioaddobbatim2r2/argocdex.git
    targetRevision: HEAD
    path: guestbook

  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook-auto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
